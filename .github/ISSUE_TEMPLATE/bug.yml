name: Bug Report
description: Report a bug with the website or tools
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: "1. Go to...\n2. Click on...\n3. See error..."
  - type: input
    id: url
    attributes:
      label: URL
      description: Which page did this happen on?
      placeholder: "https://sane-av.github.io/..."
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Drag and drop any relevant screenshots
